version: '3.8'

services:
  # Selenium Hub (Coordenador central)
  selenium-hub:
    image: selenium/hub:4.27.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      - SE_SESSION_REQUEST_TIMEOUT=300
      - SE_SESSION_RETRY_INTERVAL=5
      - SE_HEALTHCHECK_INTERVAL=10
      - GRID_MAX_SESSION=10
      - GRID_BROWSER_TIMEOUT=120
      - GRID_TIMEOUT=120
    networks:
      - selenium-grid
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Chrome Node 1
  chrome-node-1:
    image: selenium/node-chrome:4.27.0
    container_name: chrome-node-1
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    ports:
      - "7901:7900"  # VNC port para visualizar execução
    shm_size: 2gb
    networks:
      - selenium-grid
    volumes:
      - /dev/shm:/dev/shm

  # Chrome Node 2
  chrome-node-2:
    image: selenium/node-chrome:4.27.0
    container_name: chrome-node-2
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    ports:
      - "7902:7900"
    shm_size: 2gb
    networks:
      - selenium-grid
    volumes:
      - /dev/shm:/dev/shm

  # Firefox Node 1
  firefox-node-1:
    image: selenium/node-firefox:4.27.0
    container_name: firefox-node-1
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    ports:
      - "7903:7900"
    shm_size: 2gb
    networks:
      - selenium-grid
    volumes:
      - /dev/shm:/dev/shm

  # Firefox Node 2
  firefox-node-2:
    image: selenium/node-firefox:4.27.0
    container_name: firefox-node-2
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=5
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    ports:
      - "7904:7900"
    shm_size: 2gb
    networks:
      - selenium-grid
    volumes:
      - /dev/shm:/dev/shm

  # Edge Node
  edge-node:
    image: selenium/node-edge:4.27.0
    container_name: edge-node
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=3
      - SE_NODE_SESSION_TIMEOUT=300
      - SE_VNC_NO_PASSWORD=1
    ports:
      - "7905:7900"
    shm_size: 2gb
    networks:
      - selenium-grid
    volumes:
      - /dev/shm:/dev/shm

networks:
  selenium-grid:
    driver: bridge
